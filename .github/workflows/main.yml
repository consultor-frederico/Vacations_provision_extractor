name: Extrator de Ferias 2026

on:
  workflow_dispatch: # Botão para rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar Codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: pip install pypdf==5.1.0

      - name: Executar Script
        run: python extrator_ferias.py

      - name: Salvar Resultado (CSV)
        uses: actions/upload-artifact@v4 # ATUALIZADO PARA V4
        with:
          name: relatorio-ferias-extraido
          path: provisao_ferias.csv
          retention-days: 5
